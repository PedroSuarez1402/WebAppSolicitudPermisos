<div id="sec_asistencia" class="admin-section oculto">
  <div class="d-flex align-items-center justify-content-between mb-3">
    <h4 class="mb-0"><i class="bi bi-clock-history me-2"></i>Control de Asistencia</h4>
  </div>

  <div class="row g-3 mb-3">
    <div class="col-12 col-md-4">
      <div class="card shadow-sm">
        <div class="card-body">
          <div class="text-muted small">Total Registros</div>
          <div id="kpi_total_asistencia" class="fs-4 fw-bold">0</div>
        </div>
      </div>
    </div>
    <div class="col-12 col-md-4">
      <div class="card shadow-sm">
        <div class="card-body">
          <div class="text-muted small">A Tiempo</div>
          <div id="kpi_a_tiempo_asistencia" class="fs-4 fw-bold text-success">0</div>
        </div>
      </div>
    </div>
    <div class="col-12 col-md-4">
      <div class="card shadow-sm">
        <div class="card-body">
          <div class="text-muted small">Con Retraso</div>
          <div id="kpi_retraso_asistencia" class="fs-4 fw-bold text-danger">0</div>
        </div>
      </div>
    </div>
  </div>

  <div class="card shadow-sm">
    <div class="card-body">
      <div class="row g-2 mb-3">
        <div class="col-12 col-md-3">
          <label class="form-label small text-muted mb-1">Fecha Desde</label>
          <input type="date" class="form-control" id="asis_fecha_desde">
        </div>
        <div class="col-12 col-md-3">
          <label class="form-label small text-muted mb-1">Fecha Hasta</label>
          <input type="date" class="form-control" id="asis_fecha_hasta">
        </div>
        <div class="col-12 col-md-3">
          <label class="form-label small text-muted mb-1">Buscar</label>
          <input type="text" class="form-control" id="asis_buscar" placeholder="Nombre o USR-XXX">
        </div>
        <div class="col-12 col-md-3">
          <label class="form-label small text-muted mb-1">Categoría</label>
          <select class="form-select" id="asis_categoria">
            <option value="" selected>Todas</option>
            <option value="A tiempo">A tiempo</option>
            <option value="Retraso">Retraso</option>
            <option value="Registrado">Registrado</option>
          </select>
        </div>
      </div>

      <div class="table-responsive">
        <table class="table table-striped table-hover align-middle mb-0">
          <thead class="table-light">
            <tr>
              <th>Fecha</th>
              <th>Hora</th>
              <th>Empleado</th>
              <th>Tipo de Marcación</th>
              <th>Categoría</th>
            </tr>
          </thead>
          <tbody id="tbody_asistencia_admin">
            <tr><td colspan="5" class="text-center text-muted py-4">Sin datos por el momento</td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>
</div>
