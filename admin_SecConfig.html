<div id="seccion_configuracion" class="admin-section oculto">
  <div class="d-flex align-items-center justify-content-between mb-3">
    <h4 class="mb-0"><i class="bi bi-gear-fill me-2"></i>Configuración (Jefes y Motivos)</h4>
  </div>
  <div class="row g-3">
    <div class="col-12 col-xl-6">
      <div class="card shadow-sm h-100">
        <div class="card-body">
          <div class="d-flex align-items-center justify-content-between mb-3">
            <h5 class="card-title mb-0">Jefes</h5>
            <button type="button" class="btn btn-success btn-sm" onclick="abrirModalJefe()">
              <i class="bi bi-plus-lg me-1"></i>Nuevo Jefe
            </button>
          </div>
          <div class="row g-2 mb-3">
            <div class="col-12 col-md-8">
              <input type="text" class="form-control buscador-tabla" id="buscar_jefes" placeholder="Buscar en jefes...">
            </div>
            <div class="col-12 col-md-4">
              <select class="form-select filtro-estado" id="filtro_jefes">
                <option value="" selected>Todos los estados</option>
                <option value="Activo">Activo</option>
                <option value="Inactivo">Inactivo</option>
              </select>
            </div>
          </div>
          <div class="table-responsive">
            <table class="table table-striped table-hover align-middle mb-0">
              <thead class="table-light">
                <tr><th>ID Jefe</th><th>Nombre</th><th>Correo</th><th>Estado</th><th class="text-end">Acciones</th></tr>
              </thead>
              <tbody id="tbody_jefes">
                <tr><td colspan="5" class="text-center text-muted py-4">Sin datos por el momento</td></tr>
              </tbody>
            </table>
          </div>
          <div id="paginacion_jefes" class="d-flex justify-content-between align-items-center mt-3">
            <button type="button" class="btn btn-sm btn-outline-secondary btn-prev">Anterior</button>
            <span class="text-muted small page-info">Página 1 de 1</span>
            <button type="button" class="btn btn-sm btn-outline-secondary btn-next">Siguiente</button>
          </div>
        </div>
      </div>
    </div>
    <div class="col-12 col-xl-6">
      <div class="card shadow-sm h-100">
        <div class="card-body">
          <div class="d-flex align-items-center justify-content-between mb-3">
            <h5 class="card-title mb-0">Motivos</h5>
            <button type="button" class="btn btn-success btn-sm" onclick="abrirModalMotivo()">
              <i class="bi bi-plus-lg me-1"></i>Nuevo Motivo
            </button>
          </div>
          <div class="row g-2 mb-3">
            <div class="col-12 col-md-8">
              <input type="text" class="form-control buscador-tabla" id="buscar_motivos" placeholder="Buscar en motivos...">
            </div>
            <div class="col-12 col-md-4">
              <select class="form-select filtro-estado" id="filtro_motivos">
                <option value="" selected>Todos los estados</option>
                <option value="Activo">Activo</option>
                <option value="Inactivo">Inactivo</option>
              </select>
            </div>
          </div>
          <div class="table-responsive">
            <table class="table table-striped table-hover align-middle mb-0">
              <thead class="table-light">
                <tr><th>Motivo</th><th>Estado</th><th class="text-end">Acciones</th></tr>
              </thead>
              <tbody id="tbody_motivos">
                <tr><td colspan="3" class="text-center text-muted py-4">Sin datos por el momento</td></tr>
              </tbody>
            </table>
          </div>
          <div id="paginacion_motivos" class="d-flex justify-content-between align-items-center mt-3">
            <button type="button" class="btn btn-sm btn-outline-secondary btn-prev">Anterior</button>
            <span class="text-muted small page-info">Página 1 de 1</span>
            <button type="button" class="btn btn-sm btn-outline-secondary btn-next">Siguiente</button>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
