<script>
  function abrirModalAsistencia() {
    var modalEl = document.getElementById('modalAsistencia');
    if (!modalEl || !window.bootstrap) return;

    bootstrap.Modal.getOrCreateInstance(modalEl).show();

    var sel = document.getElementById('select_tipo_marcacion');
    if (sel) sel.value = '';

    var btn = document.getElementById('btn_registrar_reloj');
    if (btn) {
      btn.disabled = false;
      btn.textContent = 'Registrar Marcación';
      btn.onclick = enviarMarcacionManual;
    }
  }

  function enviarMarcacionManual() {
    var btn = document.getElementById('btn_registrar_reloj');
    var sel = document.getElementById('select_tipo_marcacion');

    var tipo = sel ? sel.value : '';
    tipo = (tipo || '').toString().trim();

    if (!tipo) {
      alert('Selecciona un tipo de marcación.');
      return;
    }

    if (btn) {
      btn.disabled = true;
      btn.textContent = 'Guardando...';
    }

    google.script.run
      .withSuccessHandler(respuestaMarcacion)
      .registrarAsistenciaManual(window.UsuarioActual.id, window.UsuarioActual.nombre, tipo);
  }

  function respuestaMarcacion(res) {
    alert((res && res.mensaje) ? res.mensaje : 'Operación completada.');

    var btn = document.getElementById('btn_registrar_reloj');
    if (btn) {
      btn.disabled = false;
      btn.textContent = 'Registrar Marcación';
    }

    if (!res || res.exito === false) return;

    var modalEl = document.getElementById('modalAsistencia');
    if (modalEl && window.bootstrap) {
      bootstrap.Modal.getOrCreateInstance(modalEl).hide();
    }
  }
</script>
