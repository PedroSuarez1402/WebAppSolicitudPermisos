<div id="seccion_empleados" class="admin-section oculto">
  <div class="d-flex align-items-center justify-content-between mb-3">
    <h4 class="mb-0"><i class="bi bi-people-fill me-2"></i>Base de Empleados</h4>
    <button type="button" class="btn btn-success btn-sm" onclick="abrirModalEmpleado()">
      <i class="bi bi-plus-lg me-1"></i>Nuevo Empleado
    </button>
  </div>
  <div class="card shadow-sm">
    <div class="card-body">
      <div class="row g-2 mb-3">
        <div class="col-12 col-md-8">
          <input type="text" class="form-control buscador-tabla" id="buscar_empleados" placeholder="Buscar en la base de empleados...">
        </div>
        <div class="col-12 col-md-4">
          <select class="form-select filtro-estado" id="filtro_empleados">
            <option value="" selected>Todos los estados</option>
            <option value="Activo">Activo</option>
            <option value="Inactivo">Inactivo</option>
          </select>
        </div>
      </div>
      <div class="table-responsive">
        <table class="table table-striped table-hover align-middle mb-0">
          <thead class="table-light">
            <tr>
              <th>ID</th><th>Nombre</th><th>Identificación</th><th>Cargo</th><th>Correo</th><th>Jefe</th><th>Estado</th><th class="text-end">Acciones</th>
            </tr>
          </thead>
          <tbody id="tbody_empleados">
            <tr><td colspan="8" class="text-center text-muted py-4">Sin datos por el momento</td></tr>
          </tbody>
        </table>
      </div>
      <div id="paginacion_empleados" class="d-flex justify-content-between align-items-center mt-3">
        <button type="button" class="btn btn-sm btn-outline-secondary btn-prev">Anterior</button>
        <span class="text-muted small page-info">Página 1 de 1</span>
        <button type="button" class="btn btn-sm btn-outline-secondary btn-next">Siguiente</button>
      </div>
    </div>
  </div>
</div>
