<div id="seccion_todas" class="admin-section oculto">
  <div class="d-flex align-items-center justify-content-between mb-3">
    <h4 class="mb-0"><i class="bi bi-archive-fill me-2"></i>Historial Completo</h4>
  </div>
  <div class="card shadow-sm">
    <div class="card-body">
      <input type="text" class="form-control mb-3 buscador-tabla" id="buscar_todas" placeholder="Buscar en el historial completo...">
      <div class="table-responsive">
        <table class="table table-striped table-hover align-middle mb-0">
          <thead class="table-light">
            <tr>
              <th>Solicitud</th> <th>Fecha del Permiso</th> <th>Empleado</th>
              <th>Identificación</th>
              <th>Estado</th>
              <th class="text-end">Acciones</th>
            </tr>
          </thead>
          <tbody id="tbody_todas">
            <tr><td colspan="6" class="text-center text-muted py-4">Sin datos por el momento</td></tr>
          </tbody>
        </table>
      </div>
      <div id="paginacion_todas" class="d-flex justify-content-between align-items-center mt-3">
        <button type="button" class="btn btn-sm btn-outline-secondary btn-prev">Anterior</button>
        <span class="text-muted small page-info">Página 1 de 1</span>
        <button type="button" class="btn btn-sm btn-outline-secondary btn-next">Siguiente</button>
      </div>
    </div>
  </div>
</div>
